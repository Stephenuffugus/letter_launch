<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Letter Launch</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- GitHub Pages serves this repo from the root, while the game lives in /docs.
     Send visitors of the root URL straight to the game. (If Pages is later set to
     serve the /docs folder, this file is simply ignored and the root IS the game.) -->
<meta http-equiv="refresh" content="0; url=./docs/">
<link rel="canonical" href="./docs/">
<script>location.replace('./docs/' + location.search + location.hash);</script>
</head>
<body style="margin:0;background:#16302a;color:#f3ead8;font-family:system-ui,sans-serif;display:grid;place-items:center;height:100vh">
<p>Redirecting to <a href="./docs/" style="color:#eaa53b">Letter Launch</a>…</p>
</body>
</html>
